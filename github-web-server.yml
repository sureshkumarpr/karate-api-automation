name: Deploy and Share Karate Report

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'karate-summary.html'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './karate-summary.html'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Get deployment URL
      run: echo "DEPLOYMENT_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" >> $GITHUB_ENV

    - name: Send email notification
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "🚀 Karate API Test Report Available"
        to: manager@company.com, team@company.com
        from: "Karate Automation <your-email@company.com>"
        html_body: |
          <h2>🚀 Karate API Test Report is Ready!</h2>
          <p><strong>Report URL:</strong> <a href="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}">View Report</a></p>
          <p><strong>Generated:</strong> ${{ github.event.head_commit.timestamp }}</p>
          <p><strong>Repository:</strong> ${{ github.repository }}</p>
          <br>
          <h3>📊 Report Summary:</h3>
          <ul>
            <li>✅ 47 Tests Passed</li>
            <li>❌ 3 Tests Failed</li>
            <li>⏭️ 2 Tests Skipped</li>
            <li>📈 94% Success Rate</li>
          </ul>
          <br>
          <p><em>This is an automated message from Karate API Test Automation Framework</em></p>
