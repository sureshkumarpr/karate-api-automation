name: Weekly Performance Tests

on:
  schedule:
    # Run every Sunday at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      test_duration:
        description: 'Test duration in minutes'
        required: false
        default: '30'
        type: string
      concurrent_users:
        description: 'Number of concurrent users'
        required: false
        default: '50'
        type: string

env:
  JAVA_VERSION: '11'
  MAVEN_OPTS: '-Xmx4g -Xms2g'

jobs:
  performance-benchmark:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        test-suite: [authentication, catalog, cart, checkout]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Run performance tests - Authentication
      if: matrix.test-suite == 'authentication'
      run: |
        mvn clean gatling:test -Pperformance \
          -Dgatling.simulationClass=performance.AuthenticationPerformanceTest \
          -Dusers=${{ github.event.inputs.concurrent_users || '100' }} \
          -Dduration=${{ github.event.inputs.test_duration || '30' }}
        
    - name: Run performance tests - Product Catalog
      if: matrix.test-suite == 'catalog'
      run: |
        mvn clean gatling:test -Pperformance \
          -Dgatling.simulationClass=performance.ProductCatalogPerformanceTest \
          -Dusers=${{ github.event.inputs.concurrent_users || '150' }} \
          -Dduration=${{ github.event.inputs.test_duration || '30' }}
        
    - name: Run performance tests - Shopping Cart
      if: matrix.test-suite == 'cart'
      run: |
        mvn clean gatling:test -Pperformance \
          -Dgatling.simulationClass=performance.CartPerformanceTest \
          -Dusers=${{ github.event.inputs.concurrent_users || '50' }} \
          -Dduration=${{ github.event.inputs.test_duration || '30' }}
        
    - name: Run performance tests - Checkout
      if: matrix.test-suite == 'checkout'
      run: |
        mvn clean gatling:test -Pperformance \
          -Dgatling.simulationClass=performance.CheckoutPerformanceTest \
          -Dusers=${{ github.event.inputs.concurrent_users || '25' }} \
          -Dduration=${{ github.event.inputs.test_duration || '30' }}
        
    - name: Upload performance reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: perf-reports-${{ matrix.test-suite }}-${{ github.run_number }}
        path: target/gatling/
        retention-days: 30
        
    - name: Generate performance summary
      run: |
        echo "## Performance Test Summary - ${{ matrix.test-suite }}" >> $GITHUB_STEP_SUMMARY
        echo "- Test Duration: ${{ github.event.inputs.test_duration || '30' }} minutes" >> $GITHUB_STEP_SUMMARY
        echo "- Concurrent Users: ${{ github.event.inputs.concurrent_users || '50' }}" >> $GITHUB_STEP_SUMMARY
        echo "- Reports available in artifacts" >> $GITHUB_STEP_SUMMARY

  performance-comparison:
    runs-on: ubuntu-latest
    needs: performance-benchmark
    if: github.event_name == 'schedule'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts/
        
    - name: Generate performance comparison report
      run: |
        echo "# Weekly Performance Comparison Report" > performance-report.md
        echo "Generated on: $(date)" >> performance-report.md
        echo "" >> performance-report.md
        echo "## Test Results Summary" >> performance-report.md
        echo "| Test Suite | Status | Notes |" >> performance-report.md
        echo "|------------|--------|-------|" >> performance-report.md
        
        for dir in artifacts/perf-reports-*/; do
          if [ -d "$dir" ]; then
            suite=$(basename "$dir" | sed 's/perf-reports-//' | sed 's/-[0-9]*$//')
            echo "| $suite | ✅ Completed | Reports available |" >> performance-report.md
          fi
        done
        
        echo "" >> performance-report.md
        echo "## Detailed Reports" >> performance-report.md
        echo "Download the artifacts for detailed Gatling reports." >> performance-report.md
        
    - name: Upload comparison report
      uses: actions/upload-artifact@v3
      with:
        name: weekly-performance-report-${{ github.run_number }}
        path: performance-report.md
        retention-days: 90
        
    - name: Create issue for performance review
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'Weekly Performance Test Results - Review Required',
            body: 'Performance tests completed. Please review the results and take necessary actions.',
            labels: ['performance', 'weekly-review']
          })
