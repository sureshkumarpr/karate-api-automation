name: CI/CD Pipeline for E-commerce API Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - regression
          - performance

env:
  JAVA_VERSION: '11'
  MAVEN_OPTS: '-Xmx2g -Xms1g'

jobs:
  # Build and Test Job
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      # Mock API service for testing
      mock-api:
        image: mockserver/mockserver:latest
        ports:
          - 1080:1080
        env:
          MOCKSERVER_PROPERTY_FILE: /config/mockserver.properties
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Run tests (Smoke)
      if: github.event.inputs.test_type == 'smoke' || github.event.inputs.test_type == 'all' || github.event.inputs.test_type == ''
      run: mvn clean test -Dkarate.options="--tags @smoke"
      
    - name: Run tests (Regression)
      if: github.event.inputs.test_type == 'regression' || github.event.inputs.test_type == 'all'
      run: mvn clean test -Dkarate.options="--tags @regression"
      
    - name: Run tests (All)
      if: github.event.inputs.test_type == '' || github.event.inputs.test_type == 'all'
      run: mvn clean test
      
    - name: Generate test reports
      run: |
        mvn karate:report
        echo "Test reports generated"
        
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-reports-${{ github.run_number }}
        path: |
          target/karate-reports/
          target/surefire-reports/
        retention-days: 30
        
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        file: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella

  # Performance Test Job
  performance-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event.inputs.test_type == 'performance' || github.event.inputs.test_type == 'all' || github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Run performance tests
      run: mvn clean gatling:test -Pperformance
      
    - name: Upload performance reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: performance-reports-${{ github.run_number }}
        path: target/gatling/
        retention-days: 30

  # Security Scan Job
  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Code Quality Job
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Run SonarCloud scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Deploy Documentation Job
  deploy-docs:
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Generate documentation
      run: |
        mvn javadoc:javadoc
        mkdir -p docs/api
        cp -r target/site/apidocs/* docs/api/
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs

  # Notification Job
  notify:
    runs-on: ubuntu-latest
    needs: [build-and-test, performance-tests, security-scan, code-quality]
    if: always()
    
    steps:
    - name: Notify on success
      if: needs.build-and-test.result == 'success'
      run: |
        echo "✅ All tests passed successfully!"
        echo "📊 Test reports are available in the artifacts section"
        
    - name: Notify on failure
      if: needs.build-and-test.result == 'failure'
      run: |
        echo "❌ Tests failed!"
        echo "🔍 Check the logs and test reports for details"

  # Integration Test Job (with real API)
  integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event.inputs.test_type == 'all' || github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Wait for API to be ready
      run: |
        echo "Waiting for external API..."
        timeout 60s bash -c 'until curl -f https://fakestoreapi.com/products; do sleep 2; done'
        
    - name: Run integration tests
      env:
        KARATE_ENV: 'prod'
      run: mvn clean test -Dkarate.options="--tags @integration"
      
    - name: Upload integration test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: integration-test-reports-${{ github.run_number }}
        path: target/karate-reports/
        retention-days: 30
